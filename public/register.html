<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Kitabevi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .register-container { width: 300px; margin: 100px auto; padding: 20px; background: white; border: 1px solid #ddd; border-radius: 8px; }
        .register-container input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .register-container button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Yeni Kayıt</h2>
        <input type="text" id="reg-username" placeholder="Kullanıcı Adı">
        <input type="password" id="reg-password" placeholder="Şifre">
        <button onclick="register()">Hesap Oluştur</button>
        <p id="msg"></p>
        <a href="login.html">Giriş Ekranına Dön</a>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;

            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();
            const msgElement = document.getElementById('msg');
            
            if (response.ok) {
                msgElement.style.color = "green";
                msgElement.innerText = result.message + " Yönlendiriliyorsunuz...";
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                msgElement.style.color = "red";
                msgElement.innerText = result.error;
            }
        }
    </script>
</body>
</html>

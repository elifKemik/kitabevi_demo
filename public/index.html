<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kitabevi Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>Kitabevi Dashboard</h2>
        <nav>
            <ul>
                <li>Home</li>
                <li>Authors</li>
                <li class="active">Inventory</li>
                <li>Settings</li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1 id="status-title">Inventory - Test Env.</h1>
        </header>

        <div id="admin-actions" style="margin-bottom: 20px; display: none; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
            <h3>Yeni Kitap Ekle</h3>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="new-title" placeholder="Kitap Adı">
                <input type="text" id="new-author" placeholder="Yazar Adı">
                <input type="number" id="new-price" placeholder="Fiyat">
                
                <label for="new-image" style="font-size: 12px; color: #666;">Kapak Seç:</label>
                <input type="file" id="new-image" accept="image/*">
                
                <button onclick="addBook()" style="background: green; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px;">Kaydet</button>
            </div>
        </div>

        <div id="user-cart-panel" style="background: #f8f9fa; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px dashed #2c3e50; display: none;">
            <h3 style="margin-top:0;">Sepetim (<span id="cart-count">0</span> Ürün)</h3>
            <ul id="cart-items" style="list-style: none; padding: 0; max-height: 150px; overflow-y: auto;">
                </ul>
            <hr>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <p style="margin:0;"><strong>Toplam: <span id="cart-total">0,00 TL</span></strong></p>
                <button onclick="checkout()" style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Ödemeyi Tamamla</button>
            </div>
        </div>

        <section class="inventory-section">
            <table id="book-table">
                <thead>
                    <tr>
                        <th>Cover</th> 
                        <th>Book List</th>
                        <th>Authors</th>
                        <th>Price</th>
                        <th id="action-header">Action</th> 
                    </tr>
                </thead>
                <tbody id="book-list">
                    </tbody>
            </table>
        </section>

        <div class="chart-container" style="background: white; margin-top: 20px; padding: 20px 20px 40px 20px; border-radius: 8px; border: 1px solid #ddd; height: 450px; position: relative;">
            <h3 style="margin-bottom: 20px;">Monthly Revenue</h3>
            <canvas id="revenueChart"></canvas>
        </div>

        <footer class="admin-footer">
    <button id="reset-btn" style="display: none;">Admin Reset</button>
    <button id="mock-data-btn" style="display: none; background: #0392a8; color: rgb(255, 255, 255); border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; margin-left: 10px;">Demo: Rastgele Satış Üret</button>
</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
